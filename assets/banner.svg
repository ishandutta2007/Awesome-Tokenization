<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>

    <!-- Text & Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Decorative Tech Grid & Elements -->
  <g opacity="0.15">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#4b5563" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#4b5563" stroke-width="1" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="200" cy="150" r="180" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="250" r="150" fill="#ec4899" opacity="0.12" filter="url(#glow)" />
  <circle cx="600" cy="200" r="120" fill="#3b82f6" opacity="0.1" filter="url(#glow)" />

  <!-- Tokenization Visual Concept Graphic (Center-Right) -->
  <g transform="translate(750, 80)">
    <!-- Input String -->
    <rect x="0" y="40" width="350" height="50" rx="10" fill="#1f2937" stroke="#4b5563" stroke-width="2" />
    <text x="25" y="72" font-family="'Courier New', monospace" font-size="20" fill="#e5e7eb" letter-spacing="2">"awesome-tokenization"</text>
    
    <!-- Splitting Lines -->
    <path d="M 40,90 L 20,160 M 135,90 L 115,160 M 225,90 L 225,160 M 325,90 L 325,160" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4" />
    
    <!-- Token Blocks (Output) -->
    <rect x="-10" y="160" width="100" height="45" rx="8" fill="#8b5cf6" opacity="0.8" />
    <text x="40" y="188" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">awesome</text>

    <rect x="100" y="160" width="40" height="45" rx="8" fill="#3b82f6" opacity="0.8" />
    <text x="120" y="188" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">-</text>

    <rect x="150" y="160" width="90" height="45" rx="8" fill="#ec4899" opacity="0.8" />
    <text x="195" y="188" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">token</text>

    <rect x="250" y="160" width="100" height="45" rx="8" fill="#10b981" opacity="0.8" />
    <text x="300" y="188" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">ization</text>

    <!-- Vectors below tokens -->
    <path d="M 40,205 L 40,250 M 120,205 L 120,250 M 195,205 L 195,250 M 300,205 L 300,250" stroke="#10b981" stroke-width="2" />
    <text x="40" y="275" font-family="'Courier New', monospace" font-size="14" fill="#a7f3d0" text-anchor="middle">[0.82]</text>
    <text x="120" y="275" font-family="'Courier New', monospace" font-size="14" fill="#a7f3d0" text-anchor="middle">[-0.11]</text>
    <text x="195" y="275" font-family="'Courier New', monospace" font-size="14" fill="#a7f3d0" text-anchor="middle">[0.45]</text>
    <text x="300" y="275" font-family="'Courier New', monospace" font-size="14" fill="#a7f3d0" text-anchor="middle">[0.93]</text>
  </g>

  <!-- Left Side Text (Title & Subtitle) -->
  <g transform="translate(80, 100)">
    <!-- Decorative Tag -->
    <rect x="0" y="0" width="180" height="28" rx="14" fill="url(#accent-grad)" opacity="0.2" />
    <rect x="0" y="0" width="180" height="28" rx="14" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" />
    <text x="90" y="18" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0" text-anchor="middle" letter-spacing="1.5">CURATED LIST</text>

    <!-- Main Title -->
    <text x="0" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="900" fill="url(#primary-grad)" letter-spacing="-1">
      Awesome
    </text>
    <text x="0" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="900" fill="#ffffff" letter-spacing="-1">
      Tokenization
    </text>

    <!-- Subtitle -->
    <text x="0" y="210" font-family="system-ui, sans-serif" font-size="18" fill="#9ca3af" font-weight="500">
      Evolution, Variants, Tooling, &amp; Applications in AI
    </text>
  </g>
</svg>
